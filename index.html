  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

15px;color:#D9F24A\">13:00–14:00<\u002Fdiv><div><h3 style=\"font-size:16.5px;font-weight:800\">Обед + нетворкинг-сессия «Найди своего вендора»<\u002Fh3><p style=\"font-size:13.5px;color:#B9B8C4;line-height:1.5;margin-top:4px\">Быстрые знакомства участников и разработчиков ИИ-сервисов.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div data-progrow=\"\" style=\"display:flex;gap:20px;padding:18px 0;border-top:1px solid rgba(241,240,234,.1)\"><div data-progtime=\"\" style=\"width:118px;flex-shrink:0;font-family:'Unbounded',sans-serif;font-weight:700;font-size:15px;color:#D9F24A\">14:00–15:00<\u002Fdiv><div><h3 style=\"font-size:16.5px;font-weight:800\">Работа по потокам, блок 2 <span style=\"font-size:11px;font-weight:700;background:rgba(91,61,245,.3);color:#C9BEFF;padding:3px 10px;border-radius:999px;white-space:nowrap\">стратегический<\u002Fspan><\u002Fh3><p style=\"font-size:13.5px;color:#B9B8C4;line-height:1.5;margin-top:4px\">«ИИ в юрбизнесе»: во что инвестировать, кого нанимать, что отдать машине.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div data-progrow=\"\" style=\"display:flex;gap:20px;padding:18px 0;border-top:1px solid rgba(241,240,234,.1)\"><div data-progtime=\"\" style=\"width:118px;flex-shrink:0;font-family:'Unbounded',sans-serif;font-weight:700;font-size:15px;color:#D9F24A\">15:00–15:30<\u002Fdiv><div><h3 style=\"font-size:16.5px;font-weight:800\">Кофе-брейк на выставке<\u002Fh3><p style=\"font-size:13.5px;color:#B9B8C4;line-height:1.5;margin-top:4px\">Демо инструментов из утренних докладов — вживую.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div data-progrow=\"\" style=\"display:flex;gap:20px;padding:18px 0;border-top:1px solid rgba(241,240,234,.1);border-bottom:1px solid rgba(241,240,234,.1)\"><div data-progtime=\"\" style=\"width:118px;flex-shrink:0;font-family:'Unbounded',sans-serif;font-weight:700;font-size:15px;color:#D9F24A\">15:30–17:00<\u002Fdiv><div><h3 style=\"font-size:16.5px;font-weight:800\">Панельные дискуссии<\u002Fh3><p style=\"font-size:1 \">Почему стоит купить билет сейчас?<span style=\"width:28px;height:28px;border-radius:10px;background:#F1F0EA;color:#17161C;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n            <p style=\"padding:0 0 20px;font-size:14.5px;color:#6E6D78;line-height:1.6\">Ранняя цена + сертификат номиналом 30 000 ₽ на прохождение курса «Технолог<span style=\"text-decoration:underline;text-decoration-thickness:.08em;text-underline-offset:.12em\">ИИ<\u002Fspan> для юристов» — оба преимущества исчезают 30 июля. И места на практикумах выбирают в порядке покупки билетов.<\u002Fp>\n          <\u002Fdetails>\n          <details style=\"background:#FFFFFF;border-radius:18px;padding:0 24px\">\n            <summary style=\"cursor:pointer;padding:20px 0;font-size:16.5px;font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:14px\">Что входит в билет?<span style=\"width:28px;height:28px;border-radius:10px;background:#F1F0EA;color:#17161C;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n            <p style=\"padding:0 0 20px;font-size:14.5px;color:#6E6D78;line-height:1.6\">Два полных дня (или один — в тарифе «Стандарт»): доклады, мастер-классы, выставка ИИ-сервисов, нетворкинг и приложение с AI-ассистентом.<\u002Fp>\n          <\u002Fdetails>\n          <details style=\"background:#FFFFFF;border-radius:18px;padding:0 24px\">\n            <summary style=\"cursor:pointer;padding:20px 0;font-size:16.5px;font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:14px\">Будут ли записи?<span style=\"width:28px;height:28px;border-radius:10px;background:#F1F0EA;color:#17161C;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n            <p style=\"padding:0 0 20px;font-size:14.5px;color:#6E6D78;line-hei this._nfIo) this._nfIo.disconnect();\n    if (this._nfResize) window.removeEventListener('resize', this._nfResize);\n    if (this._nfScroll) window.removeEventListener('scroll', this._nfScroll, { capture: true });\n    if (this._nfCheck) clearInterval(this._nfCheck);\n  }\n\n  _setupNudotFooter(attempt) {\n    const root = document.getElementById('nudot-footer');\n    if (!root || !root.querySelector('[data-fx]')) {\n      // DOM may not be fully materialized at mount time — retry briefly\n      if ((attempt || 0) < 40) setTimeout(() => this._setupNudotFooter((attempt || 0) + 1), 150);\n      return;\n    }\n    const els = [...root.querySelectorAll('[data-fx]')];\n\n    // Auto-fit the giant wordmark edge-to-edge (both lines share the size that fits the longest line).\n    // CSS clamp fallback in helmet keeps letters big even if a measurement fails.\n    const giant = root.querySelector('[data-giant]');\n    const giants = [...root.querySelectorAll('[data-giant],[data-giant2]')];\n    let tries = 0;\n    const fit = () => {\n      if (!giant) return;\n      giants.forEach(l => { l.style.fontSize = ''; });\n      const avail = giant.parentElement.clientWidth * 0.985;\n      const base = parseFloat(getComputedStyle(giant).fontSize);\n      const w = giant.scrollWidth;\n      if (avail > 0 && w > 0 && base > 0) {\n        const fs = base * avail / w;\n        giants.forEach(l => { l.style.fontSize = fs + 'px'; });\n      } else if (tries++ < 60) {\n        requestAnimationFrame(fit);\n      }\n    };\n    fit();\n    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => fit());\n    setTimeout(fit, 300);\n    this._nfResize = () => { clearTimeout(this._nfRT); this._nfRT = setTimeout(fit, 120); };\n    window.addEventListener('resize', this._nfResize);\n\n    const showAll = () => els.forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { showAll(); return; }\n\n    els.forEach(el => { el.style.transition = 'opacity .8s cubic-bezier(.22,1,.36,1), transform .95s cubic-bezier(.22,1,.36,1)'; });\n    let done = false;\n    const reveal = () => {\n      if (done) return;\n      done = true;\n      els.forEach(el => {\n        const d = parseInt(el.getAttribute('data-fx-delay') || '0', 10);\n        setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; }, d);\n      });\n    };\n    if ('IntersectionObserver' in window) {\n      this._nfIo = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) reveal(); }), { threshold: 0.05 });\n      this._nfIo.observe(root);\n    }\n    // Fallbacks so the footer can never stay invisible: capture-phase scroll\n    // (catches inner scrollers — scroll events don't bubble) + periodic check.\n    const check = () => {\n      if (done) return;\n      const r = root.getBoundingClientRect();\n      if (r.top < window.innerHeight * 0.97 && r.bottom > 0) reveal();\n    };\n    this._nfScroll = check;\n    window.addEventListener('scroll', this._nfScroll, { passive: true, capture: true });\n    this._nfCheck = setInterval(() => { check(); if (done) clearInterval(this._nfCheck); }, 700);\n    check();\n  }\n\n  _tick() {\n    const p = n => String(Math.max(0, n)).padStart(2, '0');\n    const now = Date.now();\n    const t = Math.max(0, new Date('2026-09-25T10:00:00+03:00').getTime() - now);\n    const e = Math.max(0, new Date('2026-07-30T23:59:59+03:00').getTime() - now);\n    this.setState({\n      cd: { d: p(Math.floor(t / 864e5)), h: p(Math.floor(t % 864e5 / 36e5)), m: p(Math.floor(t % 36e5 / 6e4)), s: p(Math.floor(t % 6e4 / 1e3)) },\n      eb: { d: p(Math.floor(e / 864e5)), h: p(Math.floor(e % 864e5 / 36e5)), m: p(Math.floor(e % 36e5 / 6e4)) }\n    });\n  }\n\n  _setupReveal() {\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const els = [...document.querySelectorAll('[data-reveal]')];\n    this._io = new IntersectionObserver(entries => entries.forEach(en => {\n      if (en.isIntersecting) {\n        en.target.style.opacity = '1';\n        en.target.style.transform = 'none';\n        this._io.unobserve(en.target);\n      }\n    }), { threshold: 0.1 });\n    els.forEach(el => {\n      const r = el.getBoundingClientRect();\n      if (r.top > window.innerHeight * 0.88) {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(22px)';\n        el.style.transition = 'opacity .35s ease-out, transform .35s ease-out';\n        this._io.observe(el);\n      }\n    });\n  }\n\n  renderVals() {\n    const s = this.state;\n    return {\n      cdD: s.cd.d, cdH: s.cd.h, cdM: s.cd.m, cdS: s.cd.s,\n      ebD: s.eb.d, ebH: s.eb.h, ebM: s.eb.m,\n      menuOpen: s.menuOpen, menuClosed: !s.menuOpen,\n      toggleMenu: () => this.setState({ menuOpen: !this.state.menuOpen }),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      isDay1: s.day === 1, isDay2: s.day === 2,\n      setDay1: () => this.setState({ day: 1 }),\n      setDay2: () => this.setState({ day: 2 }),\n      showFaq: this.props.showFaq ?? true,\n      stickyCta: this.props.stickyCta ?? true,\n      showOffer: this.props.showOffer ?? true,\n      showApp: this.props.showApp ?? true,\n      showExpo: this.props.showExpo ?? true\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
